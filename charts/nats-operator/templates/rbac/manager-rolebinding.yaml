{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nats-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "nats-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nats-operator.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "nats-operator.serviceAccountName" . }}
    namespace: {{ include "nats-operator.namespace" . }}
{{- end }}

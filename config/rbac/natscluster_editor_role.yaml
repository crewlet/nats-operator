# This rule is not used by the project nats-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the nats.crewlet.cloud.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: nats-operator
    app.kubernetes.io/managed-by: kustomize
  name: natscluster-editor-role
rules:
- apiGroups:
  - nats.crewlet.cloud
  resources:
  - natsclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - nats.crewlet.cloud
  resources:
  - natsclusters/status
  verbs:
  - get

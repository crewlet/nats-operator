name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check linter configuration
        run: make lint-config

      - name: Run linter
        run: make lint

  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # The chart's CRDs and the manager ClusterRole are generated from the
      # kubebuilder manifests in config/. Sync them into the chart before
      # linting so the lint reflects the operator's actual API surface.
      - name: Sync chart from config/
        run: make helm-sync

      - name: Verify chart is in sync with config/
        run: |
          if ! git diff --quiet -- charts/nats-operator/crds charts/nats-operator/templates/rbac/manager-role.yaml; then
            echo "::error::Helm chart is out of sync with config/. Run 'make helm-sync' and commit the result."
            git --no-pager diff -- charts/nats-operator/crds charts/nats-operator/templates/rbac/manager-role.yaml
            exit 1
          fi

      - name: Run helm lint
        run: make helm-lint

      - name: Run helm template smoke tests
        run: make helm-template
